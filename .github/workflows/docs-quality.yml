name: docs-quality

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs-quality.yml'
  push:
    branches: [ main ]
    paths:
      - '**/*.md'
      - '.github/workflows/docs-quality.yml'

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --verbose
            --exclude-mail
            --accept 200,206,429
            --exclude "http://127.0.0.1:8080"
            --exclude "http://127.0.0.1:8081"
            --exclude "http://localhost"
            --exclude "https://github.com/.*/blob/main/.*"
            "**/*.md"
          fail: true
