name: docs-quality

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs-quality.yml'
      - '.github/lychee.toml'
  push:
    branches: [ main ]
    paths:
      - '**/*.md'
      - '.github/workflows/docs-quality.yml'
      - '.github/lychee.toml'

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .github/lychee.toml "**/*.md"
          fail: true
