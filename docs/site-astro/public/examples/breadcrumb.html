<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breadcrumb example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-100 p-6 text-base-content">
    <main class="max-w-2xl">
      <nav aria-label="breadcrumb" class="breadcrumbs rounded-box border border-base-300 px-4 text-sm">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/users">Users</a></li>
          <li><span aria-current="page">Aiko</span></li>
        </ul>
      </nav>
    </main>
  </body>
</html>
