<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chart: Doughnut example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  </head>
  <body class="bg-base-200 p-6 text-base-content">
    <main class="max-w-3xl">
      <figure class="card bg-base-100 shadow-sm" data-mrn-chart-root>
        <div class="card-body gap-4">
          <figcaption class="space-y-1">
            <h2 class="card-title">Signup share by channel</h2>
            <p class="text-sm text-base-content/60">Part-to-whole ratio with center space.</p>
          </figcaption>
          <div class="relative w-full" style="height: 300px;">
            <canvas data-mrn-chart role="img" aria-label="Weekly signups">
              <p>Weekly signups data is available in the fallback table below.</p>
            </canvas>
          </div>
          <script type="application/json" data-mrn-chart-config>{"data":{"datasets":[{"backgroundColor":"rgba(37, 99, 235, 0.16)","borderColor":"#2563eb","data":[12,19,14,22,18],"fill":true,"label":"Signups","tension":0.3}],"labels":["Mon","Tue","Wed","Thu","Fri"]},"options":{"maintainAspectRatio":false,"plugins":{"legend":{"display":true}},"responsive":true,"scales":{"x":{},"y":{"beginAtZero":true,"title":{"display":true,"text":"Users"}}}},"type":"doughnut"}</script>
          <details class="sr-only">
            <summary>Weekly signups data is available in the fallback table below.</summary>
            <table>
              <thead>
                <tr>
                  <th scope="col">Label</th>
                  <th scope="col">Signups</th>
                </tr>
              </thead>
              <tbody>
                <tr><th scope="row">Mon</th><td>12</td></tr>
                <tr><th scope="row">Tue</th><td>19</td></tr>
                <tr><th scope="row">Wed</th><td>14</td></tr>
                <tr><th scope="row">Thu</th><td>22</td></tr>
                <tr><th scope="row">Fri</th><td>18</td></tr>
              </tbody>
            </table>
          </details>
        </div>
      </figure>
    </main>
    <script>
      (function() {
        function initCharts(root) {
          if (!window.Chart) return;
          (root || document).querySelectorAll("[data-mrn-chart]").forEach(function(canvas) {
            var container = canvas.closest("[data-mrn-chart-root]");
            var configEl = container && container.querySelector("[data-mrn-chart-config]");
            if (!configEl) return;
            new window.Chart(canvas, JSON.parse(configEl.textContent || "{}"));
          });
        }
        document.addEventListener("DOMContentLoaded", function() {
          initCharts(document);
        });
      })();
    </script>
  </body>
</html>
