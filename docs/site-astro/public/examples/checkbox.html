<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ComponentCheckbox example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-100 p-6 text-base-content">
    <main class="max-w-md space-y-3">
      <label class="label cursor-pointer justify-start gap-2 rounded-box border border-base-300 p-4">
        <input type="checkbox" name="active" value="1" class="checkbox checkbox-sm" checked />
        <span class="label-text">Active user</span>
      </label>
      <label class="label cursor-pointer justify-start gap-2 rounded-box border border-base-300 p-4">
        <input type="checkbox" name="email" value="1" class="checkbox checkbox-sm" />
        <span class="label-text">Email verified</span>
      </label>
    </main>
  </body>
</html>
