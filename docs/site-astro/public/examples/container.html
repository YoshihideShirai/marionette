<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ComponentContainer example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200 p-6 text-base-content">
    <main class="space-y-4">
      <div class="max-w-3xl rounded-box border border-primary/30 bg-primary/10 p-3 text-sm font-medium">max-w-sm style content rail</div>
      <div class="mx-auto max-w-5xl rounded-box border border-secondary/30 bg-secondary/10 p-6">
        <p class="font-semibold">Centered page container</p>
        <p class="mt-1 text-sm text-base-content/60">The component combines max width, padding, and optional centering.</p>
      </div>
      <div class="max-w-none rounded-box border border-accent/30 bg-accent/10 p-3 text-sm font-medium">full width container</div>
    </main>
  </body>
</html>
