<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DataFrameChart example</title><style>body{font-family:system-ui;padding:16px}.bars{display:grid;gap:10px;max-width:520px}.row{display:grid;grid-template-columns:90px 1fr;gap:10px;align-items:center}.bar{height:16px;background:#93c5fd;border-radius:999px}</style></head><body><div class="bars"><div class="row"><span>North</span><div class="bar" style="width:70%"></div></div><div class="row"><span>South</span><div class="bar" style="width:56%"></div></div><div class="row"><span>West</span><div class="bar" style="width:82%"></div></div></div></body></html>
