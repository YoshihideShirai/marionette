<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>File upload example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-6 bg-base-100 text-base-content">
    <main class="max-w-3xl space-y-4">
      <label class="label" for="attachment">Attachment</label>
      <input class="input w-full input-bordered" id="attachment" name="attachment" type="file" required />
    </main>
  </body>
</html>
