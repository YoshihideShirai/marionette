<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./form-primitives.css" />
  </head>
  <body class="p-6 bg-base-100 text-base-content">
    <main class="max-w-3xl">
      <form class="ui-form" aria-label="Account form">
        <div class="ui-form-row">
          <label class="ui-form-label" for="email">Email</label>
          <input id="email" class="ui-form-control" type="email" placeholder="you@example.com" />
          <p class="ui-form-description">We'll only use this for account notifications.</p>
        </div>
        <div class="ui-form-row">
          <label class="ui-form-label" for="role">Role</label>
          <select id="role" class="ui-form-control">
            <option>Viewer</option>
            <option>Editor</option>
            <option>Admin</option>
          </select>
        </div>
        <div class="ui-form-actions">
          <button class="btn btn-primary" type="button">Submit</button>
        </div>
      </form>
    </main>
  </body>
</html>
