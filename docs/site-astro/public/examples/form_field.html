<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FormField example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-6 bg-base-100 text-base-content">
    <main class="max-w-3xl">
<div class="form-control gap-1.5">
  
  <label class="label py-0">
    <span class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/70">Name</span>
    <span class="label-text text-xs font-semibold text-error">*</span>
  </label>
  
  <input class="input w-full input-bordered input-sm" name="name" type="text" value="" required />
  <p class="text-xs text-base-content/60">Enter a display name.</p>
  <p class="text-xs font-medium text-error">Name is required.</p>
</div>
    </main>
  </body>
</html>
