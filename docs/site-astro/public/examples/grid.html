<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grid example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200 p-6 text-base-content">
    <main class="max-w-5xl">
      <div class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
        <section class="card bg-base-100 shadow-sm">
          <div class="card-body gap-3">
            <span class="text-sm text-base-content/60">Users</span>
            <strong class="text-3xl">24</strong>
            <span class="h-2 rounded-full bg-primary"></span>
          </div>
        </section>
        <section class="card bg-base-100 shadow-sm">
          <div class="card-body gap-3">
            <span class="text-sm text-base-content/60">Admins</span>
            <strong class="text-3xl">4</strong>
            <span class="h-2 rounded-full bg-secondary"></span>
          </div>
        </section>
        <section class="card bg-base-100 shadow-sm">
          <div class="card-body gap-3">
            <span class="text-sm text-base-content/60">Pending</span>
            <strong class="text-3xl">7</strong>
            <span class="h-2 rounded-full bg-accent"></span>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
