<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200 p-6 text-base-content">
    <main class="max-w-xl">
      <figure class="space-y-2">
        <div class="overflow-hidden rounded-box bg-base-200 aspect-video">
          <img
            class="block w-full object-cover h-full"
            src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80"
            alt="Desk with laptop and notebook"
            width="1200"
            height="800"
            loading="lazy"
            decoding="async"
          />
        </div>
        <figcaption class="text-sm text-base-content/60">Workspace preview</figcaption>
      </figure>
    </main>
  </body>
</html>
