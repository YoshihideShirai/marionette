<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layout components example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200 p-6 text-base-content">
    <main class="mx-auto max-w-5xl space-y-6">
      <header class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
        <div class="space-y-1">
          <h1 class="text-3xl font-bold tracking-tight">Users</h1>
          <p class="text-base-content/70">Manage account records.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2"><button class="btn w-fit btn-primary btn-sm" type="button">Create</button></div>
      </header>

      <div class="grid gap-6 grid-cols-1 md:grid-cols-2 xl:grid-cols-3">
        <section class="card bg-base-100 shadow-sm">
          <div class="card-body gap-4">
            <span class="text-sm font-medium text-base-content/60">Users</span>
            <div class="flex flex-row gap-4 items-end justify-between">
              <span class="text-3xl font-bold">24</span><span class="badge badge-primary">live</span>
            </div>
          </div>
        </section>
        <section class="card bg-base-100 shadow-sm">
          <div class="card-body gap-4">
            <span class="text-sm font-medium text-base-content/60">Admins</span>
            <div class="flex flex-row gap-4 items-end justify-between">
              <span class="text-3xl font-bold">4</span><span class="badge badge-secondary">live</span>
            </div>
          </div>
        </section>
        <section class="card bg-base-100 shadow-sm">
          <div class="card-body gap-4">
            <span class="text-sm font-medium text-base-content/60">Latest start</span>
            <div class="flex flex-row gap-4 items-end justify-between">
              <span class="text-3xl font-bold">2026</span><span class="badge badge-accent">live</span>
            </div>
          </div>
        </section>
      </div>

      <div class="grid items-start gap-6 lg:grid-cols-[minmax(0,1fr)_22rem]">
        <main class="min-w-0">
          <section class="card bg-base-100 shadow-sm">
            <div class="card-body gap-4">
              <h2 class="card-title">Main workspace</h2>
              <p class="text-sm text-base-content/60">Primary content keeps a minimum width of zero for table-heavy layouts.</p>
            </div>
          </section>
        </main>
        <aside class="min-w-0">
          <section class="space-y-4">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
              <div class="space-y-1">
                <h2 class="text-xl font-semibold">Aside panel</h2>
                <p class="text-sm text-base-content/60">Secondary controls stack below the main content on narrow screens.</p>
              </div>
            </div>
          </section>
        </aside>
      </div>
    </main>
  </body>
</html>
