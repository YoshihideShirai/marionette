<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Link example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-6 bg-base-100 text-base-content">
    <main class="flex flex-wrap items-center gap-2">
      <a class="link link-hover w-fit" href="/dashboard">View dashboard</a>
      <a class="link link-hover w-fit" href="https://example.com/docs" target="_blank" rel="noopener noreferrer">Open docs</a>
      <a class="btn w-fit btn-ghost btn-sm btn-square" href="https://example.com/docs" target="_blank" rel="noopener noreferrer" aria-label="Open docs in a new tab"><span aria-hidden="true">↗</span></a>
      <a class="btn w-fit btn-primary btn-sm" href="/assets/reports/users.csv" download="users.csv">Download CSV</a>
    </main>
  </body>
</html>
