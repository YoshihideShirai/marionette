<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ModalComponent example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-6 bg-base-100 text-base-content">
    <main class="max-w-3xl">
<div class="modal modal-open" role="dialog" aria-modal="true">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Delete user</h3>
    <div class="py-4"><span>Confirm deletion</span></div>
    <div class="modal-action"><button class="btn w-fit btn-error btn-sm" type="button">Delete</button></div>
  </div>
</div>
    </main>
  </body>
</html>
