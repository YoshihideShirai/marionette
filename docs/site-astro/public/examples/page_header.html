<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PageHeaderComponent example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-100 p-6 text-base-content">
    <main class="max-w-4xl">
      <header class="flex flex-col gap-3 rounded-box border border-base-300 p-5 sm:flex-row sm:items-start sm:justify-between">
        <div class="space-y-1">
          <h1 class="text-3xl font-bold tracking-tight">Users</h1>
          <p class="text-base-content/70">Manage account records, roles, and invitations.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <button class="btn btn-ghost btn-sm" type="button">Export</button>
          <button class="btn btn-primary btn-sm" type="button">Create</button>
        </div>
      </header>
    </main>
  </body>
</html>
