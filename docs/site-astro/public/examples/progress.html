<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Progress example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200 p-6 text-base-content">
    <main class="max-w-xl space-y-6">
      <div class="space-y-2">
        <div class="flex items-center justify-between gap-3 text-sm">
          <span class="font-medium">Upload progress</span>
          <span class="text-base-content/60">72%</span>
        </div>
        <progress class="progress progress-success w-full h-4" max="100" value="72" aria-label="Upload progress">72%</progress>
      </div>

      <div class="space-y-2">
        <div class="flex items-center justify-between gap-3 text-sm">
          <span class="font-medium">Preparing import</span>
        </div>
        <progress class="progress progress-info w-full h-2" max="100" aria-label="Preparing import"></progress>
      </div>
    </main>
  </body>
</html>
