<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ComponentSection example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-100 p-6 text-base-content">
    <main class="max-w-3xl">
      <section class="space-y-4">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
          <div class="space-y-1">
            <h2 class="text-xl font-semibold">Recent activity</h2>
            <p class="text-sm text-base-content/60">An unframed content section with consistent header spacing.</p>
          </div>
          <button class="btn btn-sm btn-secondary" type="button">View all</button>
        </div>
        <div class="divide-y divide-base-300 rounded-box border border-base-300">
          <div class="flex items-center justify-between p-3"><span>Aiko updated a role</span><span class="text-sm text-base-content/50">2m</span></div>
          <div class="flex items-center justify-between p-3"><span>Ken invited a user</span><span class="text-sm text-base-content/50">9m</span></div>
        </div>
      </section>
    </main>
  </body>
</html>
