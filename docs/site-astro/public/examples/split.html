<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UISplit example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200 p-6 text-base-content">
    <main class="max-w-5xl">
      <div class="grid items-start gap-6 lg:grid-cols-[minmax(0,1fr)_22rem]">
        <main class="min-w-0">
          <section class="card bg-base-100 shadow-sm">
            <div class="card-body">
              <h1 class="card-title">Main workspace</h1>
              <div class="overflow-hidden rounded-box border border-base-300">
                <div class="grid grid-cols-3 bg-base-200 px-3 py-2 text-xs font-semibold uppercase text-base-content/60">
                  <span>Name</span><span>Role</span><span>Status</span>
                </div>
                <div class="grid grid-cols-3 px-3 py-3 text-sm">
                  <span>Aiko</span><span>Admin</span><span class="badge badge-success badge-sm">Active</span>
                </div>
              </div>
            </div>
          </section>
        </main>
        <aside class="min-w-0">
          <section class="rounded-box border border-base-300 bg-base-100 p-4 shadow-sm">
            <h2 class="font-semibold">Aside panel</h2>
            <p class="mt-1 text-sm text-base-content/60">Secondary filters stay beside the main content on wide screens.</p>
            <div class="mt-4 grid gap-2">
              <button class="btn btn-sm btn-primary" type="button">Apply</button>
              <button class="btn btn-sm btn-ghost" type="button">Reset</button>
            </div>
          </section>
        </aside>
      </div>
    </main>
  </body>
</html>
