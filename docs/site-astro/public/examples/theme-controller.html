<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>theme-controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  </head>
  <body class="p-6 bg-base-200">
    <div class="max-w-4xl p-6 bg-base-100 rounded-box shadow space-y-8">
      <h1 class="text-xl font-bold">Theme Controller variations</h1>

      <section class="space-y-2">
        <h2 class="text-sm font-semibold">1) Button group</h2>
        <div class="join" role="radiogroup" aria-label="Theme button group">
          <label class="btn join-item">
            <input type="radio" name="theme-picker" class="theme-controller sr-only" value="light" />
            Light
          </label>
          <label class="btn join-item">
            <input type="radio" name="theme-picker" class="theme-controller sr-only" value="dark" />
            Dark
          </label>
          <label class="btn join-item">
            <input type="radio" name="theme-picker" class="theme-controller sr-only" value="cupcake" checked />
            Cupcake
          </label>
          <label class="btn join-item">
            <input type="radio" name="theme-picker" class="theme-controller sr-only" value="dracula" />
            Dracula
          </label>
        </div>
      </section>

      <section class="space-y-2">
        <h2 class="text-sm font-semibold">2) Compact radio cards</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
          <label class="label cursor-pointer justify-start gap-2 rounded-box border border-base-300 px-3 py-2">
            <input type="radio" name="theme-picker" class="radio radio-xs theme-controller" value="corporate" checked />
            <span class="label-text">Corporate</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2 rounded-box border border-base-300 px-3 py-2">
            <input type="radio" name="theme-picker" class="radio radio-xs theme-controller" value="forest" />
            <span class="label-text">Forest</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2 rounded-box border border-base-300 px-3 py-2">
            <input type="radio" name="theme-picker" class="radio radio-xs theme-controller" value="luxury" />
            <span class="label-text">Luxury</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2 rounded-box border border-base-300 px-3 py-2">
            <input type="radio" name="theme-picker" class="radio radio-xs theme-controller" value="night" />
            <span class="label-text">Night</span>
          </label>
        </div>
      </section>

      <section class="space-y-2">
        <h2 class="text-sm font-semibold">3) Toggle / checkbox style</h2>
        <div class="flex flex-wrap items-center gap-4">
          <label class="label cursor-pointer gap-2">
            <span class="label-text">Dark</span>
            <input type="checkbox" class="toggle theme-controller" value="dark" />
          </label>
          <label class="label cursor-pointer gap-2">
            <span class="label-text">Retro</span>
            <input type="checkbox" class="checkbox theme-controller" value="retro" />
          </label>
        </div>
      </section>

      <section class="space-y-2">
        <h2 class="text-sm font-semibold">4) Theme preview swatches</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="theme-picker" value="light" class="theme-controller sr-only" />
            <span class="block rounded-box border border-base-300 p-2">
              <span class="font-semibold text-xs">Light</span>
              <span class="mt-2 grid grid-cols-4 gap-1">
                <span class="h-3 rounded bg-primary"></span>
                <span class="h-3 rounded bg-secondary"></span>
                <span class="h-3 rounded bg-accent"></span>
                <span class="h-3 rounded bg-neutral"></span>
              </span>
            </span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="theme-picker" value="cupcake" class="theme-controller sr-only" />
            <span class="block rounded-box border border-base-300 p-2">
              <span class="font-semibold text-xs">Cupcake</span>
              <span class="mt-2 grid grid-cols-4 gap-1">
                <span class="h-3 rounded bg-primary"></span>
                <span class="h-3 rounded bg-secondary"></span>
                <span class="h-3 rounded bg-accent"></span>
                <span class="h-3 rounded bg-neutral"></span>
              </span>
            </span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="theme-picker" value="emerald" class="theme-controller sr-only" />
            <span class="block rounded-box border border-base-300 p-2">
              <span class="font-semibold text-xs">Emerald</span>
              <span class="mt-2 grid grid-cols-4 gap-1">
                <span class="h-3 rounded bg-primary"></span>
                <span class="h-3 rounded bg-secondary"></span>
                <span class="h-3 rounded bg-accent"></span>
                <span class="h-3 rounded bg-neutral"></span>
              </span>
            </span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="theme-picker" value="night" class="theme-controller sr-only" />
            <span class="block rounded-box border border-base-300 p-2">
              <span class="font-semibold text-xs">Night</span>
              <span class="mt-2 grid grid-cols-4 gap-1">
                <span class="h-3 rounded bg-primary"></span>
                <span class="h-3 rounded bg-secondary"></span>
                <span class="h-3 rounded bg-accent"></span>
                <span class="h-3 rounded bg-neutral"></span>
              </span>
            </span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="theme-picker" value="dracula" class="theme-controller sr-only" />
            <span class="block rounded-box border border-base-300 p-2">
              <span class="font-semibold text-xs">Dracula</span>
              <span class="mt-2 grid grid-cols-4 gap-1">
                <span class="h-3 rounded bg-primary"></span>
                <span class="h-3 rounded bg-secondary"></span>
                <span class="h-3 rounded bg-accent"></span>
                <span class="h-3 rounded bg-neutral"></span>
              </span>
            </span>
          </label>
        </div>
      </section>

      <section class="space-y-2">
        <h2 class="text-sm font-semibold">5) Dropdown selector</h2>
        <label class="form-control w-full max-w-xs">
          <span class="label-text mb-1">Choose a theme</span>
          <select class="select select-bordered theme-controller" name="theme-picker">
            <option value="light">Light</option>
            <option value="cupcake">Cupcake</option>
            <option value="bumblebee">Bumblebee</option>
            <option value="synthwave">Synthwave</option>
            <option value="forest">Forest</option>
            <option value="black">Black</option>
          </select>
        </label>
      </section>
    </div>
  </body>
</html>
