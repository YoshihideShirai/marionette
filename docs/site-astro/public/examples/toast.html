<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toast example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-6 bg-base-100 text-base-content">
    <main class="max-w-3xl">
<div class="ui-feedback ui-feedback-toast ui-feedback-success ui-feedback-md" role="status" aria-live="polite" aria-atomic="true">
  <span class="ui-feedback__icon ui-icon material-icons" aria-hidden="true">OK</span>
  <div class="ui-feedback__body">
    <p class="ui-feedback__title">Settings saved</p>
    <p class="ui-feedback__description">Your workspace preferences were updated.</p>
  </div>
</div>
    </main>
  </body>
</html>
