<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ComponentCard example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-200 p-6 text-base-content">
    <main class="max-w-xl">
      <section class="card bg-base-100 shadow-sm">
        <div class="card-body gap-4">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
            <div class="space-y-1">
              <h2 class="card-title">Workspace summary</h2>
              <p class="text-sm text-base-content/60">Header, description, actions, then body content.</p>
            </div>
            <button class="btn btn-ghost btn-sm" type="button">Edit</button>
          </div>
          <div class="stats stats-vertical bg-base-200 sm:stats-horizontal">
            <div class="stat">
              <div class="stat-title">Active</div>
              <div class="stat-value text-primary">24</div>
            </div>
            <div class="stat">
              <div class="stat-title">Pending</div>
              <div class="stat-value text-secondary">7</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
