<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ComponentTable example</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-6 bg-base-100 text-base-content">
    <main class="max-w-3xl">
<div class="overflow-x-auto">
  <table class="table">
    <thead>
      <tr>
        
        <th>
          
          <a href="/?sort=name" class="inline-flex items-center gap-1 hover:underline">
            <span>Name</span><span aria-hidden="true">↑</span>
          </a>
          
        </th>
        
        <th>
          
          <span>Role</span>
          
        </th>
        
      </tr>
    </thead>
    <tbody>
      
      
      <tr>
        
        <td><span>Aiko</span></td>
        
        <td><div class="badge"><span>Admin</span></div></td>
        
      </tr>
      
      
    </tbody>
  </table>
</div>
    </main>
  </body>
</html>
