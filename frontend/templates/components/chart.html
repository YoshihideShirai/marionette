{{define "components/chart" -}}
<figure class="{{.Class}}" data-mrn-chart-root{{if .QueryStateName}} data-mrn-query-state="{{.QueryStateName}}"{{end}}{{if .QueryStateLabel}} data-mrn-filter-column="{{.QueryStateLabel}}"{{end}}>
  <div class="card-body gap-4">
    {{if or .Title .Description -}}
      <figcaption class="space-y-1">
        {{if .Title}}<h2 class="card-title">{{.Title}}</h2>{{end}}
        {{if .Description}}<p class="text-sm text-base-content/60">{{.Description}}</p>{{end}}
      </figcaption>
    {{end -}}
    <div class="relative w-full" style="height: {{.Height}}px;">
      <canvas data-mrn-chart role="img" aria-label="{{.AriaLabel}}">
        <p>{{.FallbackText}}</p>
      </canvas>
    </div>
    <script type="application/json" data-mrn-chart-config>{{.Config}}</script>
    <details class="sr-only">
      <summary>{{.FallbackText}}</summary>
      <table>
        <thead>
          <tr>
            <th scope="col">Label</th>
            {{range .Datasets}}<th scope="col">{{.Label}}</th>{{end}}
          </tr>
        </thead>
        <tbody>
          {{range .Rows -}}
            <tr>
              <th scope="row">{{.Label}}</th>
              {{range .Values}}<td>{{.}}</td>{{end}}
            </tr>
          {{end -}}
        </tbody>
      </table>
    </details>
  </div>
</figure>
{{end -}}
