{{define "components/progress" -}}
<div class="space-y-2">
  {{- if or .Label .ShowValue}}
  <div class="flex items-center justify-between gap-3 text-sm">
    {{if .Label}}<span class="font-medium">{{.Label}}</span>{{end}}
    {{if and .ShowValue (not .Indeterminate)}}<span class="text-base-content/60">{{.Percent}}</span>{{end}}
  </div>
  {{- end}}
  <progress class="{{.Class}}" max="{{.Max}}" aria-label="{{.AriaLabel}}"{{if not .Indeterminate}} value="{{.Value}}"{{end}}>{{if not .Indeterminate}}{{.Percent}}{{end}}</progress>
</div>
{{- end}}
