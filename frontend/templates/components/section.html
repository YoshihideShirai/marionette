{{define "components/section" -}}
<section class="{{.Class}}">
  {{- if or .Title .Description .Actions}}
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div class="space-y-1">
      {{if .Title}}<h2 class="text-xl font-semibold">{{.Title}}</h2>{{end}}
      {{if .Description}}<p class="text-sm text-base-content/60">{{.Description}}</p>{{end}}
    </div>
    {{if .Actions}}<div class="flex flex-wrap items-center gap-2">{{.Actions}}</div>{{end}}
  </div>
  {{- end}}
  {{range .Children}}{{.}}{{end}}
</section>
{{- end}}
