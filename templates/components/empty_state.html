{{define "components/empty_state"}}
{{if .Skeleton}}
<div class="space-y-3 px-4 py-4" aria-live="polite" aria-busy="true">
  {{range .Rows}}
  <div class="h-12 animate-pulse rounded-lg bg-base-200"></div>
  {{end}}
</div>
{{else}}
<div class="px-4 py-10 text-center">
  <div class="mx-auto mb-3 h-10 w-10 rounded-full bg-base-200"></div>
  <p class="text-base font-medium">{{.Title}}</p>
  <p class="mt-1 text-sm text-base-content/60">{{.Description}}</p>
</div>
{{end}}
{{end}}
