<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feedback Stories</title>
    <link rel="stylesheet" href="./tokens.css" />
    <style>
      body { font-family: system-ui, sans-serif; margin: 24px; }
      .story-grid { display: grid; gap: 16px; }
      .mobile { max-width: 375px; border: 1px dashed #94a3b8; padding: 12px; }
    </style>
  </head>
  <body>
    <h1>Feedback stories</h1>
    <div class="story-grid">
      <div class="ui-feedback ui-feedback-toast ui-feedback-success ui-feedback-md" role="status" aria-live="polite">
        <span class="ui-feedback__icon" aria-hidden="true">✓</span><div><p class="ui-feedback__title">通常</p><p class="ui-feedback__description">保存が完了しました。</p></div>
      </div>
      <div class="ui-feedback ui-feedback-alert ui-feedback-warning ui-feedback-lg" role="alert" aria-live="assertive">
        <span class="ui-feedback__icon" aria-hidden="true">⚠</span><div><p class="ui-feedback__title">長文</p><p class="ui-feedback__description">このメッセージは改行を伴う長文ケースです。表示崩れと行間、そして読了しやすさを確認します。</p></div>
      </div>
      <section class="ui-feedback ui-feedback-empty-state ui-feedback-info ui-feedback-md" role="region" aria-live="polite" aria-busy="false">
        <span class="ui-feedback__icon" aria-hidden="true">ℹ</span><div><p class="ui-feedback__title">アイコン付き EmptyState</p><p class="ui-feedback__description">まだデータがありません。</p></div>
      </section>
      <div class="mobile">
        <div class="ui-feedback ui-feedback-skeleton ui-feedback-error ui-feedback-sm ui-feedback-loading" role="status" aria-live="polite" aria-busy="true">
          <div style="width:100%"><div class="ui-feedback__skeleton-line"></div><div class="ui-feedback__skeleton-line"></div></div>
        </div>
        <p>モバイル幅（375px）</p>
      </div>
    </div>
  </body>
</html>
